{% extends 'base.html' %}

{% block title %}Adicionar{% endblock %}

{% block content %}
  <div class="container mt-4">
    <h2>{{ title }}</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}  <!-- Isso vai exibir o formulário com os estilos do Bootstrap -->
      <button type="submit" class="btn btn-primary mt-3">Salvar</button>
      <a href="{% url 'lista_clientes' %}" class="btn btn-secondary mt-3">Cancelar</a>
    </form>
  </div>
{% endblock %}
