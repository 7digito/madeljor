{% extends 'base.html' %}

{% block title %}Excluir Cliente{% endblock %}

{% block content %}
  <div class="container mt-4">
    <h2>Tem certeza que deseja excluir o cliente {{ cliente.nome }}?</h2>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger mt-3">Excluir</button>
      <a href="{% url 'lista_clientes' %}" class="btn btn-secondary mt-3">Cancelar</a>
    </form>
  </div>
{% endblock %}
