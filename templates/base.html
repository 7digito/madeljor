<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Título Padrão{% endblock %}</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz4fnFO9gybTkFfgG1F+I+dxA2Z2tt/5UmgFtxcG3OON5Jz62FQ5ZFGtF0" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js" integrity="sha384-xqBqLllCm77/8LOtm1wlIEl0nWm9C9lOMe3tKuj4qB5AzY78b4MfZJNk1ZmL8zI4" crossorigin="anonymous"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Garante que o body ocupa a altura total da tela */
        }

        .navbar {
            background-color: #3e6b48; /* Cor da navbar */
        }
        
        .dropdown-menu {
            display: none;  /* Esconde o menu dropdown inicialmente */
        }

        .nav-item.dropdown:hover .dropdown-menu {
            display: block;  /* Exibe o menu dropdown ao passar o mouse */
        }

        footer {
            background-color: #3e6b48; /* Cor do footer */
            color: white; /* Cor do texto no footer */
            padding: 20px 0; /* Espaçamento no footer */
            margin-top: auto; /* Faz o footer ficar na parte inferior */
        }

        .navbar .nav-link:hover {
            background-color: #2c5b3a;  /* Um tom mais escuro para o efeito de hover */
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'home-index' %}"> <!-- Redirecionar para a homepage -->
                <img src="https://madeljor.com/assets/img/logo.png" alt="Logo" height="30" class="d-inline-block align-text-top">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" aria-expanded="false">
                            Entidades
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="{% url 'lista_clientes' %}">Clientes</a></li>
                            <li><a class="dropdown-item" href="#">Fornecedores</a></li>
                            <li><a class="dropdown-item" href="#">Funcionários</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Obras</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Equipamentos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Viaturas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Extras</a>
                    </li>
                </ul>
                <div class="ms-auto">
                    <a class="nav-link" href="#">Utilizador</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="text-center">
        MDJ-GEST powered by 
        <a href="http://www.setimodigito.pt" target="_blank">
            <img border="0" alt="7D" src="http://www.setimodigito.pt/images/logo_25x25.png" width="25" height="25">
        </a> 
        - {% now "Y" %}&copy;
    </footer>
    
    

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.min.js"></script>
</body>

</html>
