<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Título Padrão{% endblock %}</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.9.1/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"
        integrity="sha384-oBqDVmMz4fnFO9gybTkFfgG1F+I+dxA2Z2tt/5UmgFtxcG3OON5Jz62FQ5ZFGtF0"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"
        integrity="sha384-xqBqLllCm77/8LOtm1wlIEl0nWm9C9lOMe3tKuj4qB5AzY78b4MfZJNk1ZmL8zI4"
        crossorigin="anonymous"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .navbar {
            background-color: #3e6b48;
        }

        .dropdown-menu {
            display: none;
        }

        .nav-item.dropdown:hover .dropdown-menu {
            display: block;
        }

        footer {
            background-color: #3e6b48;
            color: white;
            padding: 20px 0;
            margin-top: auto;
        }

        .navbar .nav-link:hover {
            background-color: #2c5b3a;
        }
    </style>
</head>

<body>
    {% include 'navbar.html' %}

    <div class="container my-4">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="text-center">
        MDJ-GEST powered by
        <a href="http://www.setimodigito.pt" target="_blank">
            <img border="0" alt="7D" src="http://www.setimodigito.pt/images/logo_25x25.png" width="25" height="25">
        </a>
        - {% now "Y" %}&copy;
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.min.js"></script>
</body>

</html>
