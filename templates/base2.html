<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Título Padrão{% endblock %}</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz4fnFO9gybTkFfgG1F+I+dxA2Z2tt/5UmgFtxcG3OON5Jz62FQ5ZFGtF0" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js" integrity="sha384-xqBqLllCm77/8LOtm1wlIEl0nWm9C9lOMe3tKuj4qB5AzY78b4MfZJNk1ZmL8zI4" crossorigin="anonymous"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #4c7972;">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Seu Logo</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Entidades</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Obras</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Equipamentos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Viaturas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Extras</a>
                    </li>
                </ul>
                <div class="ms-auto">
                    <a class="nav-link" href="#">Utilizador</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="text-center mt-5">
        <p>&copy; 2024 Sua Empresa. Todos os direitos reservados.</p>
    </footer>
</body>

</html>
